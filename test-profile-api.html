<!DOCTYPE html>
<html>
<head>
    <title>Test Profile Update API</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        input { width: 100%; padding: 8px; margin: 5px 0; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 ANANTA Profile Update Test</h1>
    
    <div class="section">
        <h2>Step 1: Test Backend Connection</h2>
        <button onclick="testBackend()">Test Backend (8082)</button>
        <button onclick="testProxy()">Test Proxy (3000)</button>
        <div id="connectionResult"></div>
    </div>

    <div class="section">
        <h2>Step 2: Test Profile Update</h2>
        <label>User ID:</label>
        <input type="text" id="userId" placeholder="AN12345678" />
        
        <label>Username:</label>
        <input type="text" id="username" placeholder="testuser" />
        
        <label>Full Name:</label>
        <input type="text" id="fullName" placeholder="Test User" />
        
        <label>Bio:</label>
        <input type="text" id="bio" placeholder="Test bio" />
        
        <button onclick="updateProfile()">Update Profile</button>
        <div id="updateResult"></div>
    </div>

    <div class="section">
        <h2>Logs</h2>
        <pre id="logs"></pre>
    </div>

    <script>
        function log(message) {
            const logs = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            logs.textContent += `[${timestamp}] ${message}\n`;
        }

        async function testBackend() {
            const result = document.getElementById('connectionResult');
            result.innerHTML = 'Testing...';
            log('Testing backend on port 8082...');
            
            try {
                const response = await fetch('http://localhost:8082/api/app/health');
                const data = await response.json();
                
                if (data.status === 'OK') {
                    result.innerHTML = '<div class="success">✅ Backend is running!</div>';
                    log('SUCCESS: Backend is running');
                } else {
                    result.innerHTML = '<div class="error">❌ Backend returned unexpected response</div>';
                    log('ERROR: Unexpected response: ' + JSON.stringify(data));
                }
            } catch (error) {
                result.innerHTML = '<div class="error">❌ Backend is NOT running<br>Run START_BACKEND.bat</div>';
                log('ERROR: ' + error.message);
            }
        }

        async function testProxy() {
            const result = document.getElementById('connectionResult');
            result.innerHTML = 'Testing...';
            log('Testing Next.js proxy on port 3000...');
            
            try {
                const response = await fetch('http://localhost:3000/api/app/health');
                const data = await response.json();
                
                if (data.status === 'OK') {
                    result.innerHTML = '<div class="success">✅ Proxy is working!</div>';
                    log('SUCCESS: Proxy is working');
                } else {
                    result.innerHTML = '<div class="error">❌ Proxy returned unexpected response</div>';
                    log('ERROR: Unexpected response: ' + JSON.stringify(data));
                }
            } catch (error) {
                result.innerHTML = '<div class="error">❌ Next.js is NOT running<br>Run START_ADMIN_PANEL.bat</div>';
                log('ERROR: ' + error.message);
            }
        }

        async function updateProfile() {
            const result = document.getElementById('updateResult');
            result.innerHTML = 'Updating...';
            
            const userId = document.getElementById('userId').value;
            const username = document.getElementById('username').value;
            const fullName = document.getElementById('fullName').value;
            const bio = document.getElementById('bio').value;
            
            if (!userId) {
                result.innerHTML = '<div class="error">❌ Please enter User ID</div>';
                return;
            }
            
            const payload = {
                userId: userId,
                username: username || 'testuser',
                fullName: fullName || 'Test User',
                bio: bio || 'Test bio',
                location: 'Test Location',
                gender: 'Male',
                birthday: '01/01/2000'
            };
            
            log('Sending profile update: ' + JSON.stringify(payload, null, 2));
            
            try {
                const response = await fetch('http://localhost:3000/api/app/profile', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                log('Response status: ' + response.status);
                log('Response data: ' + JSON.stringify(data, null, 2));
                
                if (response.ok) {
                    result.innerHTML = '<div class="success">✅ Profile updated successfully!</div>';
                    log('SUCCESS: Profile updated');
                } else {
                    result.innerHTML = `<div class="error">❌ Error: ${data.message || 'Unknown error'}</div>`;
                    log('ERROR: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                result.innerHTML = '<div class="error">❌ Request failed: ' + error.message + '</div>';
                log('ERROR: ' + error.message);
            }
        }

        // Auto-test on load
        window.onload = function() {
            log('Page loaded. Click buttons to test.');
        };
    </script>
</body>
</html>
